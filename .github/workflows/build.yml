name: Build job

on:
  schedule:
    # Every Wednesday and Sunday at 16:00 UTC-5
    - cron: "0 21 * * 0,3"

  workflow_dispatch:
    inputs:
      git-ref:
        description: Git Ref (Optional)
        required: false
      dry-run:
        description: Creates a draft release
        required: false

jobs:
  build-app:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repository (Latest)
        if: github.event.inputs.git-ref == ''
        uses: actions/checkout@v6
        with:
          repository: lnreader/lnreader
          fetch-depth: 0

      - name: Clone Repository (Custom Ref)
        if: github.event.inputs.git-ref != ''
        uses: actions/checkout@v6
        with:
          repository: lnreader/lnreader
          fetch-depth: 0
          ref: ${{ github.event.inputs.git-ref }}

      - name: Enable arm64-only ABI split
        run: |
          if ! grep -q 'include "arm64-v8a"' android/app/build.gradle; then
            awk '
            /buildTypes {/ && !x {
              print "    splits {"
              print "        abi {"
              print "            enable true"
              print "            reset()"
              print "            include \"arm64-v8a\""
              print "            universalApk false"
              print "        }"
              print "    }"
              x=1
            }
            { print }
            ' android/app/build.gradle > tmp && mv tmp android/app/build.gradle
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm Store Directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Get previous release
        id: last_release
        uses: InsonusK/get-latest-release@v1.0.1
        with:
          myToken: ${{ github.token }}
          exclude_types: draft|prerelease
          view_top: 1

      - name: Prepare build metadata
        run: |
          set -e

          commit_count=$(git rev-list --count HEAD)
          echo "COMMIT_COUNT=$commit_count" >> "$GITHUB_ENV"

          current_sha=$(git rev-parse --short HEAD)
          echo "CURRENT_SHA=$current_sha" >> "$GITHUB_ENV"

          prev_tag="${{ steps.last_release.outputs.tag_name }}"
          prev_commit_count=$(echo "${prev_tag:-r0}" | sed -e 's/^r//')

          commit_count_diff=$((commit_count - prev_commit_count))
          if [ "$commit_count_diff" -lt 0 ]; then
            commit_count_diff=0
          fi

          prev_release_sha=$(git rev-parse --short HEAD~$commit_count_diff)
          echo "PREV_RELEASE_SHA=$prev_release_sha" >> "$GITHUB_ENV"

          echo "COMMIT_LOGS<<EOF" >> "$GITHUB_ENV"
          curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/LNReader/lnreader/compare/$prev_release_sha...$current_sha" \
            | jq '[.commits[] | {message:(.commit.message | split("\n")), username:.author.login}]' \
            | jq -r '.[] | "- \(.message | first) (@\(.username))"' >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Generate Environment Variables
        run: |
          pnpm generate:env:release \
            --build-type "Github Action" \
            --node-env "production"

      - name: Pre-install NDK (with retry)
        run: |
          for i in 1 2 3; do
            "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
              "ndk;27.1.12297006" && break
            echo "Attempt $i failed, retrying..."
            sleep 10
          done

      - name: Build Android Release with Rock (arm64 only)
        uses: callstackincubator/android@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        with:
          re-sign: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          variant: release

      - name: Rename & checksum APK
        run: |
          set -e

          cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk \
            LNReader-arm64-v8a-r${{ env.COMMIT_COUNT }}.apk

          sha=$(sha256sum LNReader-arm64-v8a-r${{ env.COMMIT_COUNT }}.apk | awk '{ print $1 }')
          echo "APK_ARM64_SHA=$sha" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: r${{ env.COMMIT_COUNT }}
          name: LNReader Preview r${{ env.COMMIT_COUNT }}
          body: |
            ### Commits

            https://github.com/lnreader/lnreader/compare/${{ env.PREV_RELEASE_SHA }}...${{ env.CURRENT_SHA }}

            ${{ env.COMMIT_LOGS }}

            ---

            ### Checksums

            | Variant   | SHA-256 |
            |-----------|----------|
            | arm64-v8a | ${{ env.APK_ARM64_SHA }} |

          files: LNReader-arm64-v8a-r${{ env.COMMIT_COUNT }}.apk
          draft: ${{ github.event.inputs.dry-run != '' }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
